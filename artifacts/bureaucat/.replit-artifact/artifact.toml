kind = "web"
previewPath = "/"
title = "BureauCat"
version = "1.0.0"
id = "artifacts/bureaucat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20885

[services.development]
run = "pnpm --filter @workspace/bureaucat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bureaucat", "run", "build" ]
publicDir = "artifacts/bureaucat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20885"
BASE_PATH = "/"
